name: Validate SOC Portfolio

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python scripts/generate_sample_logs.py
      - run: python scripts/evaluate_detections.py
      - run: python scripts/validate_project.py
      - run: pytest -q

